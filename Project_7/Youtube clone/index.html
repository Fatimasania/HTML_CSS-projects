<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Youtube</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<header>

    <div class="navbar">
        <div class="N_sec1">
         <i class="fa-solid fa-bars"></i>
         <img class="logo" src="images/youtube-logo.png" alt="youtube">
        </div>

      <div class="N_sec2">
        <div class="search_box">
            <input class="search" type="text" placeholder="Search">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <i class="fa-solid fa-microphone"></i>
      </div>

      <div class="N_sec3">
          <p class="nav_text">+ Create</p>
        <i class="fa-regular fa-bell"></i>
        <img class="avatar" src="images/profile.jpg" alt="avatar-pic">
      </div>

    </div> <!--upper nav end-->

<!--        <div class="nav_bottom">-->
<!--            <p class="nav_text">All</p>-->
<!--            <p class="nav_text">Javascript</p>-->
<!--            <p class="nav_text">Movies</p>-->
<!--            <p class="nav_text">Games</p>-->
<!--            <p class="nav_text">Dramas</p>-->
<!--            <p class="nav_text">Songs</p>-->
<!--        </div>-->


</header>
<div class="container">

<aside>
    <div class="side_bar">
        <div class="side_bar_top">
            <div class="content">
                <i class="fa-solid fa-house"></i>
                <p>Home</p>
            </div>
            <div class="content">
                <i class="fa-regular fa-circle-play"></i>
                <p>Shorts</p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="side_bar_middle">
            <div class="content">
                <i class="fa-solid fa-user"></i>
                <p>Your Channel</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <p>History</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-list"></i>
                <p>Playlist</p>
            </div>
            <div class="content">
                <i class="fa-regular fa-clock"></i>
                <p>Watch later</p>
            </div>
            <div class="content">
                <i class="fa-regular fa-thumbs-up"></i>
                <p>Liked videos</p>
            </div>
            <div class="content">
                <i class="fa-brands fa-square-youtube"></i>
                <p>Your videos</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-download"></i>
                <p>Downloads</p>
            </div>

        </div>

        <div class="divider"></div>

        <div class="side_bar_last">
            <div class="content">
                <i class="fa-solid fa-music"></i>
                <p>Music</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-clapperboard"></i>
                <p>Films</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-gamepad"></i>
                <p>Gaming</p>
            </div>
            <div class="content">
                <i class="fa-solid fa-angle-down"></i>
                <p>Show more</p>
            </div>
            <div class="content">
                <i class="fa-regular fa-flag"></i>
                <p>Report</p>
            </div>

        </div>
    </div> <!--aside end-->
</aside>

</div> <!---end div-->

</body>
</html>
