<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
</head>
<body>
<main>
    <form>
    <div class="container">

        <div class="header">
            <h1>Job Application <span id="web">(web)</span></h1>
        </div>

        <div class="info">

                <label for="first-name">First Name
                <input class="name_input" type="text" name="first-name" id="first-name" placeholder="Enter First Name">
                </label>

                <label for="last-name">Last Name
                <input class="name_input" type="text" name="last-name" id="last-name" placeholder="Enter Last Name">
                </label>

            <div class="second_row">
                <label for="email">Email
                    <input class="name_input" type="email" name="Email" id="email" placeholder="Enter Email">
                </label>
            </div>
            <div class="second_row">
                <label >Job Role
                  <select class="job_role name_input">
                      <option value="">Select</option>
                      <option value="Backend Developer">Backend Developer</option>
                      <option value="Frontend Developer">Frontend Developer</option>
                      <option value="Fullstack Developer">Fullstack Developer</option>
                      <option value="Mobile app Developer">Mobile app Developer</option>
                  </select>
                </label>
            </div>
            <div class="third_row">
                <label for="txt">Enter Address</label>
                <textarea  id="txt" name="Address" rows="4" cols="50" placeholder="Enter your full address..."></textarea>
            </div>

            <div class="fourth_row">
            <label for="city">City
                <input class="name_input" type="text" name="city" id="city" placeholder="Enter City">
            </label>

            <label for="pcd">Pincode
                <input class="name_input" type="number" name="Pin_code" id="pcd" placeholder="Enter Pincode">
            </label>
            </div>

            <div class="fifth_row">
                <label for="date">Start Date
                    <input class="name_input" type="date" name="date" id="date">
                </label>

                <label for="cv">Upload your CV
                    <input class="name_input" type="file" name="cv" id="cv">
                </label>
            </div>

            <div class="btn">
                <button class="submit" type="submit">Apply Now</button>
            </div>

        </div>

    </div> <!--end-->
    </form>
</main>

</body>
</html>
