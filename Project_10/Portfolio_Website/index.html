<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body>
<header>
    <nav>
        <div class="navbar">
            <h1 class="logo">Portfolio</h1>
            <ul class="nav-links">
                <li>
                    <a href="#Home">Home</a>
                </li>
                <li>
                    <a href="#Projects">Projects</a>
                </li>
                <li>
                    <a href="#Contact">Contact</a>
                </li>
            </ul>
        </div>
    </nav>
</header>

<main>
    <div class="sec1" id="Home">
        <div>
            <img class="image animate__animated animate__bounceInLeft" src="images/me.png" alt="My image">
        </div>
        <div class="sec1-text">
            <h1><span class="hi">Hi</span>, I am <span class="name">Sania Fatima</span></h1>
            <h2 class="role typewriter">Frontend Developer</h2>
        </div>
    </div>

    <div class="sec2" id="Projects">
        <div class="sec2-text">
            <h2>Projects</h2>
        </div>

        <section class="grid-projects">
            <div class="grid-item">
                <img class="grid-image" src="images/project1.png" alt="project1">
                <p class="grid-text">The Tribute Page</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project2.png" alt="project2">
                <p class="grid-text">Job Application</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project3.png" alt="project3">
                <p class="grid-text">Landing Page</p>
            </div>

            <div class="grid-item">

                <img class="grid-image" src="images/project4.png" alt="project4">
                <p class="grid-text">Parallax Website</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project5.png" alt="project5">
                <p class="grid-text">Restaurant Website</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project6.png" alt="project6">
                <p class="grid-text">Music Website</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project7.png" alt="project7">
                <p class="grid-text">Youtube Clone</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project8.png" alt="project8">
                <p class="grid-text">Documentation Page</p>
            </div>

            <div class="grid-item">
                <img class="grid-image" src="images/project9.png" alt="project9">
                <p class="grid-text">Blog Page</p>
            </div>

        </section>
    </div>
</main>
</body>
</html>
