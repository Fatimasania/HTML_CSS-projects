<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Website</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<header>
    <nav>
        <div class="navbar">
            <div class="nav-logo">
                <img src="images/logo.png" alt="logo">
            </div>
            <div class="nav-icon">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div> <!--navbar-->
    </nav>

</header>
<main>
    <div class="container">
        <div class="first-view">
            <div class="hero-image">
                <img  src="images/hero_image.png" alt="hero-image">
            </div>
            <div class="content-text">
                <button class="btn-offer">
                    50 % OFF  All Products
                </button>
                <h1 class="title">
                    Enjoy Your
                    Delicious Food
                </h1>
                <h4 class="subtitle">
                    Discover fresh, flavorful dishes made with love.
                    From quick bites to full meals, we bring you the best dining experience right to your table.
                </h4>
                <button class="btn">
                    Explore Now
                </button>

            </div>
        </div>
    </div>
</main>

</body>
</html>
